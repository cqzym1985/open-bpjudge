name: "Auto Label Issues"

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write

jobs:
  auto-label:
    runs-on: ubuntu-latest
    steps:
      - name: "Classify issue and manage labels"
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const action = context.payload.action;

            const title = (issue.title || "").toLowerCase();
            const body = (issue.body || "").toLowerCase();
            const text = `${title}\n${body}`;

            const managedLabels = [
              "triage",
              "bug",
              "enhancement",
              "documentation",
              "question"
            ];

            function hasAny(keywords) {
              return keywords.some(keyword => text.includes(keyword));
            }

            let nextLabel = "triage";

            if (hasAny([
              "bug", "error", "fail", "failed", "failure",
              "crash", "broken", "exception", "not work",
              "doesn't work", "cannot", "can't",
              "报错", "报错", "异常", "无法", "崩溃"
            ])) {
              nextLabel = "bug";
            } else if (hasAny([
              "feature", "request", "enhancement",
              "improve", "improvement", "proposal",
              "would like", "add support",
              "建议", "改进", "优化", "需求"
            ])) {
              nextLabel = "enhancement";
            } else if (hasAny([
              "doc", "docs", "documentation",
              "readme", "guide", "tutorial", "example",
              "文档", "说明", "教程"
            ])) {
              nextLabel = "documentation";
            } else if (hasAny([
              "question", "how to", "how do i",
              "help", "why", "what is", "usage",
              "为什么", "请问", "怎么", "如何", "怎样"
            ])) {
              nextLabel = "question";
            }

            const currentLabels = (issue.labels || []).map(label => label.name);

            const labelsToRemove = currentLabels.filter(label =>
              managedLabels.includes(label) && label !== nextLabel
            );

            for (const label of labelsToRemove) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number,
                  name: label
                });
                console.log(`Removed managed label: ${label}`);
              } catch (error) {
                console.log(`Could not remove label ${label}: ${error.message}`);
              }
            }

            if (!currentLabels.includes(nextLabel)) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: [nextLabel]
              });
              console.log(`Added label: ${nextLabel}`);
            } else {
              console.log(`Label already present: ${nextLabel}`);
            }

            const commentMap = {
              triage:
                "Thank you for opening this issue. It has been labeled `triage` for initial review.",
              bug:
                "Thank you for the report. This issue has been labeled `bug` and will be reviewed by the maintainers.",
              enhancement:
                "Thank you for the suggestion. This issue has been labeled `enhancement` for further evaluation.",
              documentation:
                "Thank you for raising this documentation-related issue. It has been labeled `documentation`.",
              question:
                "Thank you for your question. This issue has been labeled `question` for review."
            };

            if (action === "opened" || action === "reopened") {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: commentMap[nextLabel]
              });
              console.log(`Added comment for label: ${nextLabel}`);
            }